{% extends "emails/base.html" %}
{% block title %}New follower — Cave Dragon{% endblock %}
{% block content %}
<h2>New Follower</h2>
<p>Hi {{ username }},</p>
<p><strong>{{ follower_username }}</strong> started following you on Cave Dragon.</p>
{% if follower_bio %}
<div class="card">
  <p style="margin: 0; font-style: italic;">{{ follower_bio }}</p>
</div>
{% endif %}
<p style="text-align: center; margin: 28px 0;">
  <a href="{{ profile_url }}" class="btn btn-primary">View Profile</a>
</p>
{% endblock %}
