{% extends "emails/base.html" %}
{% block title %}You were mentioned — Cave Dragon{% endblock %}
{% block content %}
<h2>You were mentioned</h2>
<p>Hi {{ username }},</p>
<p><strong>{{ mentioner_username }}</strong> mentioned you in {{ context }}:</p>
<div class="card">
  <p style="margin: 0;">{{ message_text }}</p>
</div>
<p style="text-align: center; margin: 28px 0;">
  <a href="{{ content_url }}" class="btn btn-primary">View Message</a>
</p>
{% endblock %}
